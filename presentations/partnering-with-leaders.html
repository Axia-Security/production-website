<title>Axia — Partnering with Leaders</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<style>
/* Hide scrollbar completely */
::-webkit-scrollbar { display: none; }
html, body { scrollbar-width: none; -ms-overflow-style: none; }

:root {
  --primary: #0D9488;
  --primary-deep: #09434e;
  --accent-cyan: #22D3EE;
  --accent-orange: #F97316;
  --bg-dark: #0D1117;
  --bg-card: #161B22;
  --bg-elevated: #1C2128;
  --text-primary: #E6EDF3;
  --text-secondary: #8B949E;
  --text-muted: #6B7280;
  --border: rgba(255,255,255,0.08);
  --severity-critical: #E74C3C;
  --severity-high: #F39C12;
  --severity-medium: #3498DB;
  --severity-low: #6B7280;
  --gradient-brand: linear-gradient(135deg, #0D9488, #22D3EE);
  --gradient-text: linear-gradient(135deg, #E6EDF3, #22D3EE);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Manrope', system-ui, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  overflow: hidden;
  height: 100%; width: 100%;
}

/* ── Slide System ── */
.slide {
  display: none;
  width: 100%; height: 100vh;
  padding: 60px 80px;
  position: relative;
  overflow: hidden;
}
.slide.active { display: flex; flex-direction: column; }

/* Subtle grid bg */
.slide::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* ── Brand Bar ── */
.brand-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; position: relative; z-index: 1;
}
.brand-logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--gradient-brand);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: #fff;
}
.logo-text {
  font-size: 16px; font-weight: 700; letter-spacing: 0.04em;
  color: var(--text-primary);
}
.section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--primary);
  font-family: 'JetBrains Mono', monospace;
}

/* ── Typography ── */
h1 {
  font-size: 48px; font-weight: 800; line-height: 1.15;
  letter-spacing: -0.02em; margin-bottom: 16px;
  position: relative; z-index: 1;
}
h2 {
  font-size: 36px; font-weight: 700; line-height: 1.2;
  letter-spacing: -0.01em; margin-bottom: 12px;
  position: relative; z-index: 1;
}
h3 {
  font-size: 18px; font-weight: 700; line-height: 1.3;
  margin-bottom: 8px; position: relative; z-index: 1;
}
.highlight {
  background: var(--gradient-brand);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 18px; color: var(--text-secondary);
  line-height: 1.6; max-width: 700px;
  position: relative; z-index: 1;
}
.mono { font-family: 'JetBrains Mono', monospace; }

/* ── Section Divider Slide ── */
.slide-section-divider {
  justify-content: center; align-items: center; text-align: center;
}
.slide-section-divider .section-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600;
  color: var(--primary); letter-spacing: 0.15em;
  text-transform: uppercase; margin-bottom: 16px;
}
.slide-section-divider h1 {
  font-size: 56px; max-width: 700px;
}
.slide-section-divider .subtitle {
  margin: 0 auto;
}

/* ── Cards ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  position: relative; z-index: 1;
}
.card-title {
  font-size: 16px; font-weight: 700; margin-bottom: 8px;
}
.card-body {
  font-size: 14px; color: var(--text-secondary); line-height: 1.6;
}

/* ── Grids ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; position: relative; z-index: 1; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; position: relative; z-index: 1; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; position: relative; z-index: 1; }
.flex-center { display: flex; flex: 1; align-items: center; justify-content: center; }
.flex-col { display: flex; flex-direction: column; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }

/* ── Stats ── */
.stat-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 42px; font-weight: 700;
  color: var(--accent-cyan);
}
.stat-label {
  font-size: 13px; color: var(--text-secondary); line-height: 1.4;
  margin-top: 4px;
}
.stat-source {
  font-size: 10px; color: var(--text-muted); margin-top: 6px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Pills / Badges ── */
.badge {
  display: inline-block;
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: rgba(13,148,136,0.15);
  color: var(--primary); border: 1px solid rgba(13,148,136,0.3);
}
.pill {
  display: inline-block;
  padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.pill-critical { background: rgba(231,76,60,0.15); color: var(--severity-critical); }
.pill-high { background: rgba(243,156,18,0.15); color: var(--severity-high); }
.pill-medium { background: rgba(52,152,219,0.15); color: var(--severity-medium); }
.pill-low { background: rgba(107,114,128,0.15); color: var(--severity-low); }
.pill-yes { background: rgba(13,148,136,0.15); color: var(--primary); }

/* ── Quote ── */
.quote-block {
  border-left: 3px solid var(--primary);
  padding: 16px 24px;
  font-size: 16px; font-style: italic;
  color: var(--text-secondary); line-height: 1.6;
  background: rgba(13,148,136,0.04);
  border-radius: 0 8px 8px 0;
  position: relative; z-index: 1;
}

/* ── Table ── */
.vs-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.vs-table th {
  text-align: left; padding: 10px 12px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.vs-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}
.vs-table tr:last-child td { border-bottom: none; }

/* ── Pillar Cards ── */
.pillar-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.pillar-icon { font-size: 28px; margin-bottom: 10px; }
.pillar-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700;
  color: var(--accent-cyan);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.pillar-desc {
  font-size: 12px; color: var(--text-secondary); line-height: 1.5;
}

/* ── Flow Steps ── */
.flow-container {
  display: flex; justify-content: center; gap: 12px;
  position: relative; z-index: 1;
}
.flow-step {
  text-align: center; flex: 1; max-width: 160px;
  position: relative;
}
.flow-icon {
  width: 48px; height: 48px; margin: 0 auto 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.flow-label {
  font-size: 14px; font-weight: 700; margin-bottom: 4px;
}
.flow-desc {
  font-size: 11px; color: var(--text-secondary); line-height: 1.4;
}
.flow-arrow {
  position: absolute; right: -18px; top: 22px;
  color: var(--primary); font-size: 16px;
}

/* ── Timeline ── */
.timeline {
  display: flex; flex-direction: column; gap: 16px;
  position: relative; z-index: 1;
}
.timeline-step {
  display: flex; align-items: flex-start; gap: 16px;
}
.timeline-dot {
  width: 36px; height: 36px; min-width: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}
.timeline-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--accent-cyan);
  min-width: 72px; margin-top: 8px;
}
.timeline-detail {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.6; flex: 1;
}

/* ── Transform Grid ── */
.transform-grid {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 24px; position: relative; z-index: 1;
}
.transform-side { display: flex; flex-direction: column; gap: 10px; }
.transform-title {
  font-size: 14px; font-weight: 700;
  padding: 10px 16px; border-radius: 8px;
  display: flex; align-items: center; gap: 8px;
}
.transform-title.before {
  background: rgba(231,76,60,0.1);
  color: var(--severity-critical);
}
.transform-title.after {
  background: rgba(13,148,136,0.1);
  color: var(--primary);
}
.transform-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: var(--text-secondary);
  padding: 6px 16px; line-height: 1.4;
}
.transform-divider {
  display: flex; align-items: center; justify-content: center;
}
.transform-arrow {
  font-size: 24px; color: var(--primary);
}

/* ── Audience Cards ── */
.audience-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.audience-card.primary {
  border-color: rgba(13,148,136,0.4);
  background: rgba(13,148,136,0.05);
}
.audience-icon { font-size: 24px; margin-bottom: 8px; }
.audience-role {
  font-size: 14px; font-weight: 700;
  margin-bottom: 10px;
}
.audience-pain {
  font-size: 12px; color: var(--text-secondary);
  line-height: 1.5; margin-bottom: 12px;
}
.audience-message {
  font-size: 13px; color: var(--accent-cyan);
  line-height: 1.5; font-style: italic;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

/* ── Founder Cards ── */
.founder-card {
  text-align: center;
}
.founder-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 2px solid var(--primary);
  margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.founder-name {
  font-size: 16px; font-weight: 700; margin-bottom: 2px;
}
.founder-role {
  font-size: 12px; color: var(--primary);
  font-family: 'JetBrains Mono', monospace;
}

/* ── Wrong Direction Items ── */
.wrong-item {
  display: flex; gap: 20px; align-items: flex-start;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.wrong-item:last-child { border-bottom: none; }
.wrong-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 700;
  color: var(--primary); min-width: 32px;
}
.wrong-content h3 {
  font-size: 15px; margin-bottom: 4px;
}
.wrong-content p {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
}

/* ── Hex Framework ── */
.hex-container {
  display: flex; align-items: center; justify-content: center;
  gap: 24px; position: relative; z-index: 1;
}
.hex-item {
  text-align: center; flex: 1; max-width: 220px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.hex-label {
  font-size: 14px; font-weight: 700; margin-bottom: 8px;
}
.hex-detail {
  font-size: 12px; color: var(--text-secondary); line-height: 1.6;
}
.hex-arrow {
  font-size: 24px; color: var(--primary);
}

/* ── CTA ── */
.cta-stats {
  display: flex; gap: 40px; justify-content: center;
  margin: 32px 0; position: relative; z-index: 1;
}
.cta-stat { text-align: center; }
.cta-stat .stat-number { font-size: 36px; }
.cta-stat .stat-label { font-size: 12px; }

/* ── Hero Slide ── */
.slide-hero {
  justify-content: center; align-items: center; text-align: center;
}
.slide-hero h1 { font-size: 56px; max-width: 800px; }

/* ── Closing ── */
.slide-closing {
  justify-content: center; align-items: center; text-align: center;
}
.closing-brand {
  font-size: 72px; font-weight: 800; letter-spacing: 0.06em;
  background: var(--gradient-brand);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.closing-tagline {
  font-size: 20px; color: var(--text-secondary);
  margin-bottom: 32px;
}
.closing-pillars {
  display: flex; gap: 40px; justify-content: center;
  margin-bottom: 40px;
}
.closing-pillar-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700;
  color: var(--accent-cyan);
  letter-spacing: 0.12em;
}
.closing-pillar-sub {
  font-size: 11px; color: var(--text-muted);
  margin-top: 2px;
}

/* ── Navigation ── */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 10px 24px;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center;
  z-index: 100;
}
.nav-sections {
  display: flex; gap: 4px; justify-self: start;
}
.nav-section-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  opacity: 0.3;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-section-dot.active {
  background: var(--primary);
  opacity: 1;
  width: 24px;
  border-radius: 4px;
}
.nav-center {
  display: flex; align-items: center; gap: 16px;
}
.nav-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--primary); background: var(--bg-elevated); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-muted);
  min-width: 60px; text-align: center;
}
.nav-slide-dots {
  display: flex; gap: 3px; justify-self: end;
}
.nav-slide-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  opacity: 0.2;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-slide-dot.active {
  background: var(--accent-cyan);
  opacity: 1;
}
.nav-slide-dot.section-start {
  opacity: 0.5;
}

/* ── Scanning Lens Accent ── */
.lens-accent {
  position: absolute;
  width: 400px; height: 400px;
  pointer-events: none; z-index: 0;
  opacity: 0.06;
}
.lens-accent.top-right { top: -100px; right: -100px; }
.lens-accent.bottom-left { bottom: -100px; left: -100px; }
.lens-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid var(--primary);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.lens-ring-1 { width: 80%; height: 80%; animation: spin 40s linear infinite; }
.lens-ring-2 { width: 55%; height: 55%; border-color: var(--accent-cyan); animation: spin 30s linear infinite reverse; }
.lens-ring-3 { width: 30%; height: 30%; animation: spin 20s linear infinite; }
@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

/* ── Problem Icon ── */
.problem-icon {
  width: 40px; height: 40px;
  background: rgba(13,148,136,0.1);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.problem-icon .material-symbols-outlined {
  font-size: 22px; color: var(--primary);
}

/* ── Outcome Row ── */
.outcome-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.outcome-icon { font-size: 24px; min-width: 32px; text-align: center; }
.outcome-metric {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 700;
  color: var(--accent-cyan);
  min-width: 80px;
}
.outcome-title {
  font-size: 15px; font-weight: 600;
}
.outcome-desc {
  font-size: 12px; color: var(--text-secondary); margin-top: 2px;
}

/* ── Persona Highlight ── */
.persona-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  text-align: center;
}

/* ── Competitive Badge ── */
.comp-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
}
.comp-yes { background: rgba(13,148,136,0.15); color: var(--primary); }
.comp-partial { background: rgba(243,156,18,0.15); color: var(--severity-high); }
.comp-no { background: rgba(107,114,128,0.15); color: var(--severity-low); }

/* slide content wrapper */
.slide-content {
  flex: 1; display: flex; flex-direction: column;
  position: relative; z-index: 1;
  overflow: hidden;
}

/* scrollable content area */
.content-scroll {
  flex: 1; overflow-y: auto; padding-right: 8px;
}

/* ── Scrollable slide content ── */
.slide-content {
  flex: 1; display: flex; flex-direction: column;
  position: relative; z-index: 1;
  overflow-y: auto;
  padding-bottom: 60px;
}
.slide-content
.slide-content
.slide-content
.slide-content { scrollbar-color: rgba(255,255,255,0.03) transparent; scrollbar-width: thin; }

/* ── GTM Section styles ── */
.partner-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  position: relative; z-index: 1;
}
.partner-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  display: flex; align-items: center; justify-content: center;
  min-height: 80px; transition: all 0.2s;
}
.partner-card:hover { border-color: rgba(13,148,136,0.4); }
.partner-name {
  font-size: 15px; font-weight: 700; color: var(--text-primary); text-align: center;
}
.flywheel {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; position: relative; z-index: 1; margin: 16px 0;
}
.flywheel-node {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 24px; text-align: center; min-width: 180px;
}
.flywheel-node.active { border-color: rgba(13,148,136,0.5); background: rgba(13,148,136,0.05); }
.flywheel-arrow { font-size: 24px; color: var(--primary); }
.dp-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; display: flex; align-items: center; gap: 20px;
}
.dp-status {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
}
.dp-deployed { background: rgba(13,148,136,0.15); color: var(--primary); }
.dp-signed { background: rgba(34,211,238,0.15); color: var(--accent-cyan); }
.dp-fortune { background: rgba(249,115,22,0.15); color: var(--accent-orange); }
.pricing-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; font-weight: 700; color: var(--accent-cyan); margin-bottom: 4px;
}

/* -- Competitive Matrix -- */.matrix-container {  position: relative;  width: 580px; height: 400px;  margin: 0 auto;  z-index: 1;}.matrix-axis-x, .matrix-axis-y {  position: absolute;  background: var(--border);}.matrix-axis-x {  bottom: 50%; left: 0; right: 0; height: 1px;}.matrix-axis-y {  left: 50%; top: 0; bottom: 0; width: 1px;}.matrix-label {  position: absolute;  font-size: 11px; font-weight: 600;  color: var(--text-muted);  font-family: 'JetBrains Mono', monospace;  letter-spacing: 0.08em; text-transform: uppercase;}.matrix-dot {  position: absolute;  padding: 6px 12px;  border-radius: 8px;  font-size: 11px; font-weight: 700;  white-space: nowrap;  transform: translate(-50%, -50%);  border: 1px solid var(--border);}.matrix-dot.axia {  background: rgba(13,148,136,0.25);  color: var(--primary);  border-color: var(--primary);  font-size: 14px;  padding: 8px 16px;  z-index: 2;}.matrix-dot.legacy {  background: rgba(231,76,60,0.1);  color: var(--severity-critical);}.matrix-dot.modern {  background: rgba(243,156,18,0.1);  color: var(--severity-high);}.matrix-dot.adjacent {  background: rgba(107,114,128,0.1);  color: var(--text-muted);}.quad-label {  position: absolute;  font-size: 10px;  color: rgba(255,255,255,0.15);  font-style: italic;}

/* Slide Jump Overlay */
.slide-jump-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center;
}
.slide-jump-overlay.active { display: flex; }
.slide-jump-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 32px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.slide-jump-box label {
  display: block; font-size: 14px; color: var(--text-secondary);
  margin-bottom: 12px; font-family: 'Inter', sans-serif;
}
.slide-jump-box input {
  width: 80px; padding: 8px 12px; font-size: 20px; text-align: center;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); outline: none;
  font-family: 'JetBrains Mono', monospace;
}
.slide-jump-box input:focus { border-color: var(--primary); }
.slide-jump-hint {
  font-size: 11px; color: var(--text-muted); margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
}

/* Ask slide styles */
.ask-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; position: relative; z-index: 1; }
.ask-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.ask-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
.ask-card ul { list-style: none; padding: 0; }
.ask-card li { padding: 6px 0; font-size: 14px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.ask-card li:last-child { border-bottom: none; }
